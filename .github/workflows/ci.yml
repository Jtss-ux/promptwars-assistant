name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm test
        env:
          NODE_ENV: test
          PORT: 8081

      - name: Upload test results (summary)
        if: always()
        run: echo "Tests completed for Node.js ${{ matrix.node-version }}"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  size-check:
    name: Repository Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check repository size
        run: |
          SIZE=$(git ls-files | xargs -I{} stat -c %s {} 2>/dev/null | paste -sd+ | bc)
          SIZE_KB=$((SIZE / 1024))
          echo "Repository tracked files size: ${SIZE_KB} KB"
          if [ $SIZE_KB -gt 900 ]; then
            echo "⚠️  Warning: Repository is approaching 1 MB limit (${SIZE_KB} KB)"
          else
            echo "✅ Repository size OK: ${SIZE_KB} KB / 1024 KB"
          fi
